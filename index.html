<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body & Fingertip Ball Physics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #mainCanvas { display: block; width: 100vw; height: 100vh; }
        video, #segCanvas { display: none; }

        #loading {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.92);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; color: #fff;
        }
        .spinner {
            width: 56px; height: 56px;
            border: 4px solid rgba(0,255,255,0.15);
            border-top-color: #0ff;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin-bottom: 22px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .load-title { font-size: 26px; font-weight: 700; color: #0ff; letter-spacing: 3px; }
        .load-desc { margin-top: 10px; font-size: 13px; color: #999; text-align: center; line-height: 1.7; }

        #hud {
            position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.65); color: #eee;
            padding: 10px 24px; border-radius: 28px; font-size: 13px;
            pointer-events: none;
            border: 1px solid rgba(0,255,255,0.45);
            box-shadow: 0 0 14px rgba(0,255,255,0.2);
            z-index: 5; white-space: nowrap;
        }
        #debug {
            position: fixed; top: 8px; left: 10px;
            color: #0f0; font: 11px/1.4 monospace;
            z-index: 5; pointer-events: none;
        }
    </style>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <!-- Physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <div class="load-title">AI MOTION CAPTURE</div>
    <div class="load-desc">
        カメラのアクセスを許可してください。<br>
        AIモデルを読み込み中…
    </div>
</div>

<div id="hud">親指＋人差し指でつまんでボールをつかむ ／ 体全体でボールが弾む</div>
<div id="debug"></div>

<video id="video" muted playsinline autoplay></video>
<canvas id="mainCanvas"></canvas>
<canvas id="segCanvas"></canvas>

<script>
(function () {
    "use strict";

    // ================================================================
    // DOM Elements
    // ================================================================
    const video = document.getElementById('video');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const segCanvas = document.getElementById('segCanvas');
    const segCtx = segCanvas.getContext('2d', { willReadFrequently: true });
    const loadingEl = document.getElementById('loading');
    const debugEl = document.getElementById('debug');

    // ================================================================
    // Matter.js Physics Engine
    // ================================================================
    const { Engine, World, Bodies, Body } = Matter;
    const engine = Engine.create();
    engine.gravity.y = 0.55;
    const world = engine.world;

    // ================================================================
    // Camera / Canvas Layout
    // ================================================================
    const CAM_W = 640, CAM_H = 480;
    let drawW, drawH, offX, offY;

    function updateLayout() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        const videoRatio = CAM_W / CAM_H;
        const canvasRatio = canvas.width / canvas.height;
        if (videoRatio > canvasRatio) {
            drawH = canvas.height;
            drawW = drawH * videoRatio;
        } else {
            drawW = canvas.width;
            drawH = drawW / videoRatio;
        }
        offX = (canvas.width - drawW) / 2;
        offY = (canvas.height - drawH) / 2;
        rebuildWalls();
    }

    // Invisible walls (floor + sides)
    let wallBodies = [];
    function rebuildWalls() {
        wallBodies.forEach(w => World.remove(world, w));
        wallBodies = [];
        const W = canvas.width, H = canvas.height, thickness = 80;
        wallBodies.push(
            Bodies.rectangle(W / 2, H + thickness / 2, W * 3, thickness, { isStatic: true, restitution: 0.6 }),
            Bodies.rectangle(-thickness / 2, H / 2, thickness, H * 3, { isStatic: true, restitution: 0.6 }),
            Bodies.rectangle(W + thickness / 2, H / 2, thickness, H * 3, { isStatic: true, restitution: 0.6 })
        );
        wallBodies.forEach(w => World.add(world, w));
    }

    addEventListener('resize', updateLayout);
    updateLayout();

    // ================================================================
    // Coordinate mapping (normalized → screen, mirrored)
    // ================================================================
    function mapCoord(nx, ny) {
        return {
            x: offX + (1.0 - nx) * drawW,
            y: offY + ny * drawH
        };
    }

    // ================================================================
    // Body Contour Collision - Static Circle Pool
    // ================================================================
    const CONTOUR_POOL_SIZE = 800;
    const contourPool = [];
    for (let i = 0; i < CONTOUR_POOL_SIZE; i++) {
        const body = Bodies.circle(-3000, -3000, 9, {
            isStatic: true,
            friction: 0.03,
            restitution: 0.88
        });
        contourPool.push(body);
        World.add(world, body);
    }
    let activeContourCount = 0;

    // ================================================================
    // Ball Management
    // ================================================================
    let balls = [];
    const MAX_BALLS = 50;

    function spawnBall() {
        // Remove oldest if over limit
        if (balls.length >= MAX_BALLS) {
            const old = balls.shift();
            if (grabbedBall[0] === old) grabbedBall[0] = null;
            if (grabbedBall[1] === old) grabbedBall[1] = null;
            World.remove(world, old);
        }
        const radius = 13 + Math.random() * 16;
        const ball = Bodies.circle(
            80 + Math.random() * (canvas.width - 160), -70, radius,
            { restitution: 0.82, friction: 0.015, density: 0.003, frictionAir: 0.0008 }
        );
        ball._radius = radius;
        ball._color = `hsl(${Math.random() * 360 | 0}, 82%, 58%)`;
        balls.push(ball);
        World.add(world, ball);
    }

    // ================================================================
    // Hand Grab State (supports 2 hands)
    // ================================================================
    const grabbedBall = [null, null];
    const prevGripPos = [{ x: 0, y: 0 }, { x: 0, y: 0 }];
    const gripVelocity = [{ x: 0, y: 0 }, { x: 0, y: 0 }];
    const pinchSmooth = [0, 0];
    let latestHandLandmarks = null;

    // ================================================================
    // Model Ready Tracking
    // ================================================================
    let segReady = false, handsReady = false, appStarted = false;
    function checkModelsReady() {
        if (segReady && handsReady && !appStarted) {
            appStarted = true;
            loadingEl.style.display = 'none';
        }
    }

    // ================================================================
    // Segmentation Processing
    // ================================================================
    function processSegmentation(segMask) {
        // Draw mask at reduced resolution for performance
        const scale = 0.2;
        const sw = Math.round(CAM_W * scale);
        const sh = Math.round(CAM_H * scale);
        segCanvas.width = sw;
        segCanvas.height = sh;
        segCtx.drawImage(segMask, 0, 0, sw, sh);

        const imageData = segCtx.getImageData(0, 0, sw, sh);
        const pixels = imageData.data;

        // Build binary mask (threshold on R channel or alpha)
        const binary = new Uint8Array(sw * sh);
        for (let i = 0; i < sw * sh; i++) {
            binary[i] = (pixels[i * 4] > 100 || pixels[i * 4 + 3] > 100) ? 1 : 0;
        }

        // Edge detection: find contour pixels
        const pointsX = [], pointsY = [];
        for (let y = 1; y < sh - 1; y++) {
            for (let x = 1; x < sw - 1; x++) {
                const idx = y * sw + x;
                if (!binary[idx]) continue;
                // If any 4-neighbor is background, this is an edge pixel
                if (!binary[idx - 1] || !binary[idx + 1] || !binary[idx - sw] || !binary[idx + sw]) {
                    pointsX.push(x);
                    pointsY.push(y);
                }
            }
        }

        // Interior horizontal "ribs" for solid collision coverage
        // (prevents balls from passing through the body's interior)
        for (let y = 0; y < sh; y += 3) {
            let leftEdge = -1, rightEdge = -1;
            for (let x = 0; x < sw; x++) {
                if (binary[y * sw + x]) {
                    if (leftEdge < 0) leftEdge = x;
                    rightEdge = x;
                }
            }
            if (leftEdge >= 0 && rightEdge > leftEdge) {
                const span = rightEdge - leftEdge;
                const step = Math.max(3, Math.floor(span / 6));
                for (let x = leftEdge; x <= rightEdge; x += step) {
                    pointsX.push(x);
                    pointsY.push(y);
                }
            }
        }

        // Map points to screen coordinates and place physics bodies
        const totalPoints = pointsX.length;
        let placed = 0;

        if (totalPoints <= CONTOUR_POOL_SIZE) {
            for (let i = 0; i < totalPoints; i++) {
                Body.setPosition(contourPool[i], mapCoord(pointsX[i] / sw, pointsY[i] / sh));
                placed++;
            }
        } else {
            // Uniformly sample if we have too many points
            const sampleStep = totalPoints / CONTOUR_POOL_SIZE;
            for (let i = 0; i < CONTOUR_POOL_SIZE; i++) {
                const j = Math.floor(i * sampleStep);
                Body.setPosition(contourPool[i], mapCoord(pointsX[j] / sw, pointsY[j] / sh));
                placed++;
            }
        }

        // Move unused bodies off-screen
        for (let i = placed; i < CONTOUR_POOL_SIZE; i++) {
            Body.setPosition(contourPool[i], { x: -3000, y: -3000 });
        }
        activeContourCount = placed;
    }

    // ================================================================
    // Hands Processing (pinch grab/release)
    // ================================================================
    function processHands(multiHandLandmarks) {
        latestHandLandmarks = multiHandLandmarks;

        if (!multiHandLandmarks || multiHandLandmarks.length === 0) {
            for (let h = 0; h < 2; h++) releaseGrab(h);
            return;
        }

        for (let h = 0; h < Math.min(multiHandLandmarks.length, 2); h++) {
            const lm = multiHandLandmarks[h];

            // Key landmarks: 4=thumb tip, 8=index tip, 12=middle tip, 0=wrist
            const thumbTip = mapCoord(lm[4].x, lm[4].y);
            const indexTip = mapCoord(lm[8].x, lm[8].y);
            const middleTip = mapCoord(lm[12].x, lm[12].y);
            const wrist = mapCoord(lm[0].x, lm[0].y);

            // Pinch detection: distance between thumb tip and index tip
            const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
            const handSize = Math.hypot(wrist.x - middleTip.x, wrist.y - middleTip.y) || 120;
            const threshold = Math.max(28, handSize * 0.26);

            // Smooth pinch state to avoid flickering
            pinchSmooth[h] = pinchSmooth[h] * 0.45 + (pinchDist < threshold ? 1 : 0) * 0.55;
            const isPinching = pinchSmooth[h] > 0.5;

            // Grip position = midpoint of thumb tip and index tip
            const gripX = (thumbTip.x + indexTip.x) / 2;
            const gripY = (thumbTip.y + indexTip.y) / 2;

            // Velocity tracking for throwing
            const vx = gripX - prevGripPos[h].x;
            const vy = gripY - prevGripPos[h].y;
            gripVelocity[h].x = gripVelocity[h].x * 0.45 + vx * 0.55;
            gripVelocity[h].y = gripVelocity[h].y * 0.45 + vy * 0.55;
            prevGripPos[h] = { x: gripX, y: gripY };

            if (isPinching && !grabbedBall[h]) {
                // Search for nearest ball to grab
                let closest = null, closestDist = Infinity;
                for (const ball of balls) {
                    if (grabbedBall[1 - h] === ball) continue; // other hand already has it
                    const d = Math.hypot(ball.position.x - gripX, ball.position.y - gripY);
                    if (d < ball._radius + 55 && d < closestDist) {
                        closest = ball;
                        closestDist = d;
                    }
                }
                if (closest) {
                    grabbedBall[h] = closest;
                    Body.setVelocity(closest, { x: 0, y: 0 });
                }
            } else if (isPinching && grabbedBall[h]) {
                // Move ball to grip position
                Body.setPosition(grabbedBall[h], { x: gripX, y: gripY });
                Body.setVelocity(grabbedBall[h], { x: 0, y: 0 });
            } else if (!isPinching && grabbedBall[h]) {
                // Release with velocity (throw)
                Body.setVelocity(grabbedBall[h], {
                    x: gripVelocity[h].x * 0.9,
                    y: gripVelocity[h].y * 0.9
                });
                grabbedBall[h] = null;
            }
        }

        // Release grabs for undetected hands
        for (let h = multiHandLandmarks.length; h < 2; h++) {
            releaseGrab(h);
        }
    }

    function releaseGrab(handIndex) {
        if (!grabbedBall[handIndex]) return;
        Body.setVelocity(grabbedBall[handIndex], {
            x: gripVelocity[handIndex].x * 0.5,
            y: gripVelocity[handIndex].y * 0.5
        });
        grabbedBall[handIndex] = null;
    }

    // ================================================================
    // Hand skeleton connections for visualization
    // ================================================================
    const HAND_CONNECTIONS = [
        [0,1],[1,2],[2,3],[3,4],        // thumb
        [0,5],[5,6],[6,7],[7,8],        // index
        [0,17],[5,9],[9,10],[10,11],[11,12], // middle
        [9,13],[13,14],[14,15],[15,16], // ring
        [13,17],[17,18],[18,19],[19,20] // pinky
    ];

    // ================================================================
    // Render Loop
    // ================================================================
    let fps = 0, frameCount = 0, lastFpsTime = performance.now();

    function renderLoop() {
        requestAnimationFrame(renderLoop);

        // Step physics
        Engine.update(engine, 16.67);

        const
